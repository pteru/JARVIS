# JARVIS cron-log rotation (user-scope, no root needed).
# Run daily from crontab:
#   /usr/sbin/logrotate --state /home/teruel/JARVIS/logs/.logrotate.state \
#     /home/teruel/JARVIS/config/logrotate/jarvis.conf
#
# copytruncate is REQUIRED: cron jobs append with `>>` and hold open handles;
# rename-based rotation would leave them writing to the rotated file.

/home/teruel/JARVIS/logs/*.log {
    size 10M
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
